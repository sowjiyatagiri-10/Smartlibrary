<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set up your password for SRKR Smart Library">
  <title>Set Password — SRKR Smart Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="login-page page-wrap">
    <div class="logo">📚 SRKR Smart Library</div>
    <p class="tagline">Smart Library Management System</p>

    <div class="card login-card">
      <h2>Set Your Password</h2>
      <p class="sub">First time login — create a secure password for your account</p>

      <div class="register-badge" id="regBadge">
        <span>🆔</span>
        <span id="regIdDisplay">—</span>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="pw-wrap">
          <input id="newPassword" type="password" placeholder="Minimum 8 characters" oninput="checkStrength()">
          <button class="eye-btn" onclick="togglePwField('newPassword', this)" type="button">👁</button>
        </div>
        <div class="strength-bar">
          <div class="fill" id="strengthFill"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="pw-wrap">
          <input id="confirmPassword" type="password" placeholder="Re-enter your password">
          <button class="eye-btn" onclick="togglePwField('confirmPassword', this)" type="button">👁</button>
        </div>
      </div>

      <div id="setupError" class="error-msg" style="display:none"></div>
      <button id="setupBtn" class="btn" onclick="setupPassword()">Set Password & Login</button>
    </div>
  </div>

  <script src="js/setup-password.js"></script>
</body>
</html>
