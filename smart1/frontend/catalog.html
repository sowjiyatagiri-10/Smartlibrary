<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and borrow books from the SRKR Smart Library catalog">
  <title>Book Catalog — SRKR Smart Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="config.js"></script>
</head>
<body>
  <div id="navContainer"></div>

  <div class="page-wrap">
    <div class="main-content">
      <div class="page-header">
        <h1>Book Catalog</h1>
        <p>Browse and request books from our collection</p>
      </div>

      <!-- Accession Number Quick Request -->
      <div class="card accession-card" style="margin-bottom:24px;padding:1.25rem 1.5rem;">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <span style="font-size:20px;">🏷️</span>
          <span style="font-weight:600;font-size:14px;">Quick Request via Accession Number:</span>
          <input type="text" id="accessionInput" placeholder="e.g. ACC-001" style="max-width:200px;padding:10px 14px;font-size:14px;">
          <button class="btn btn-sm" id="accessionBtn" onclick="requestByAccession()">Request Book</button>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by title or author..." oninput="handleSearch()">
        </div>
        <div class="category-pills" id="categoryPills">
          <button class="pill active" data-category="All" onclick="selectCategory('All', this)">All</button>
          <button class="pill" data-category="Technology" onclick="selectCategory('Technology', this)">Technology</button>
          <button class="pill" data-category="Mathematics" onclick="selectCategory('Mathematics', this)">Mathematics</button>
          <button class="pill" data-category="Science" onclick="selectCategory('Science', this)">Science</button>
          <button class="pill" data-category="Biography" onclick="selectCategory('Biography', this)">Biography</button>
          <button class="pill" data-category="Fiction" onclick="selectCategory('Fiction', this)">Fiction</button>
        </div>
      </div>

      <div class="result-count" id="resultCount">Loading books...</div>
      <div class="book-grid" id="bookGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal-content">
      <h3 id="modalTitle">Confirm Request</h3>
      <p id="modalMessage">Submit a borrow request for this book?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn" id="modalConfirmBtn" onclick="confirmBorrow()">Request Book</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
